version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: expense_tracker_db
    environment:
      POSTGRES_DB: ${DB_NAME:-expense_tracker}
      POSTGRES_USER: ${DB_USER:-expense_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-expense_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - expense_tracker
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: expense_tracker_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - expense_tracker
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: ${DOCKERFILE:-Dockerfile.dev}
      args:
        ENVIRONMENT: ${ENVIRONMENT:-development}
    container_name: expense_tracker_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.${ENVIRONMENT:-development}
      PYTHONUNBUFFERED: 1
      DEBUG: ${DEBUG:-True}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - expense_tracker
    restart: unless-stopped

  celery:
    build:
      context: .
      dockerfile: ${DOCKERFILE:-Dockerfile.dev}
      args:
        ENVIRONMENT: ${ENVIRONMENT:-development}
    container_name: expense_tracker_celery
    command: celery -A config worker -l info --concurrency=4
    volumes:
      - .:/app
      - ./logs:/app/logs
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.${ENVIRONMENT:-development}
      PYTHONUNBUFFERED: 1
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - expense_tracker
    restart: unless-stopped

  celery-beat:
    build:
      context: .
      dockerfile: ${DOCKERFILE:-Dockerfile.dev}
      args:
        ENVIRONMENT: ${ENVIRONMENT:-development}
    container_name: expense_tracker_celery_beat
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
      - ./logs:/app/logs
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.${ENVIRONMENT:-development}
      PYTHONUNBUFFERED: 1
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - expense_tracker
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  expense_tracker:
    driver: bridge
